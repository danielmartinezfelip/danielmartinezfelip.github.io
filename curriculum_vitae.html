<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daniel Martínez-Felip - Curriculum Vitae</title>
    <style>
        :root {
            color-scheme: light dark;
            --background: #e5e7eb;
            --surface: #ffffff;
            --surface-alt: #f3f4f6;
            --text: #1f2937;
            --muted: #4b5563;
            --accent: #2563eb;
            --accent-strong: #1d4ed8;
            --border: rgba(15, 23, 42, 0.12);
            --shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
            --shadow-hover: 0 22px 50px rgba(15, 23, 42, 0.18);
            --radius: 26px;
        }
        body {
            font-family: 'Cambria', 'Times New Roman', serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: var(--background);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .container {
            width: min(1200px, 94%);
            margin: 0 auto;
            padding: 32px 0 48px;
            flex: 1;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.45s ease-out both;
        }
        header {
            text-align: center;
            padding: 20px 24px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: linear-gradient(135deg, #eef2ff 0%, #f0f4ff 40%, #f3f4f6 70%, #e8f0fe 100%);
            background-size: 300% 300%;
            box-shadow: var(--shadow);
            animation: gradientShift 25s ease-in-out infinite;
            position: sticky;
            top: 16px;
            z-index: 100;
        }
        h1 {
            font-size: 2.1em;
            margin: 0;
            color: var(--text);
        }
        header h2 {
            border-bottom: none;
            color: var(--muted);
            margin-top: 5px;
            margin-bottom: 10px;
        }
        nav {
            margin-top: 10px;
        }
        nav ul {
            padding: 0;
            list-style: none;
            margin: 0;
        }
        nav ul li {
            display: inline;
            margin: 0 15px;
        }
        nav ul li a {
            color: var(--muted);
            text-decoration: none;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 999px;
            border: 1px solid transparent;
            transition: border-color 0.3s ease, color 0.3s ease, background-color 0.3s ease;
        }
        nav ul li a:hover {
            color: var(--text);
            border-color: rgba(15, 23, 42, 0.15);
            background-color: rgba(37, 99, 235, 0.06);
        }
        nav ul li a.nav-active {
            color: var(--accent);
            border-color: rgba(37, 99, 235, 0.35);
            background-color: rgba(37, 99, 235, 0.08);
        }
        .pdf-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: calc(100vh - 180px); /* Full height minus desktop header; mobile override below. */
            padding: 24px 0 0;
            margin: 0;
        }
        .card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
        }
        iframe {
            width: 100%;
            height: 100%;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            display: block;
            background: var(--surface);
            box-shadow: var(--shadow);
        }
        h2 {
            color: var(--text);
            border-bottom: 1px solid var(--border);
            padding-bottom: 6px;
        }
        a {
            color: var(--accent);
            text-decoration: none;
        }
        a:hover {
            color: var(--accent);
            text-decoration: underline;
        }
        .site-footer {
            margin-top: 24px;
            padding: 18px 24px;
            border-radius: 999px;
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            font-size: 0.9em;
            color: var(--muted);
        }
        .footer-links {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
        }
        .footer-links a {
            color: var(--muted);
            text-decoration: none;
        }
        .footer-links a:hover {
            color: var(--muted);
            text-decoration: underline;
        }
        @keyframes gradientShift {
            0%   { background-position: 0% 50%; }
            33%  { background-position: 100% 50%; }
            66%  { background-position: 50% 100%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @media (prefers-reduced-motion: reduce) {
            header { animation: none; }
            .container { animation: none; }
            .card { transition: none; }
        }
        @media (max-width: 768px) {
            header {
                padding: 16px 18px;
            }
            .pdf-container {
                height: calc(100vh - 160px); /* Full height minus compact mobile header. */
            }
            .site-footer {
                border-radius: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="card">
            <h1>Daniel Martínez-Felip</h1>
            <h2>Curriculum Vitae</h2>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="research.html">Research</a></li>
                    <li><a href="teaching.html">Teaching</a></li>
                    <li><a href="curriculum_vitae.html" class="nav-active">CV</a></li>
                </ul>
            </nav>
        </header>

        <div class="pdf-container">
            <iframe src="https://drive.google.com/file/d/14yQ4v4fANxc674NiDEIoY8fFCZTq3TPw/preview" allowfullscreen></iframe>
        </div>
        <footer class="site-footer card">
            <div class="footer-links">
                <a href="mailto:martinezfelipd@gmail.com">Email</a>
                <a href="https://scholar.google.com/citations?user=IZFSPNoAAAAJ&hl=en">Google Scholar</a>
                <a href="https://orcid.org/0009-0000-6979-904X">ORCID</a>
                <a href="https://bsky.app/profile/dmartinezfelip.bsky.social">Bluesky</a>
            </div>
            <div>© 2026 Daniel Martínez-Felip</div>
        </footer>
    </div>
</body>
</html>
