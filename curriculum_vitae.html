    <style>
        /* --- CV-specific overrides ------------------------------ */
        body {
            height: 100vh;         /* exact viewport; no scroll on CV page */
        }
        .container {
            width: min(1200px, 94%);
            display: flex;
            flex-direction: column;
        }
        header h2 {
            margin-bottom: 10px;
        }
        .pdf-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: calc(100vh - 180px);
            padding: 24px 0 0;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            display: block;
            background: var(--surface);
            box-shadow: var(--shadow);
        }
        .site-footer {
            border-radius: 999px;   /* pill shape on CV page */
        }
        @media (max-width: 768px) {
            header {
                padding: 16px 18px;
            }
            .pdf-container {
                height: calc(100vh - 160px);
            }
            .site-footer {
                border-radius: 24px;
            }
        }
    </style>
</head>
<body>

            <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode"></button>
        </header>

        <script>
            (() => {
                const themeToggle = document.getElementById('theme-toggle');
                if (themeToggle) {
                    const root = document.documentElement;
                    themeToggle.addEventListener('click', () => {
                        const isDark = root.getAttribute('data-theme') === 'dark'
                            || (!root.hasAttribute('data-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
                        const next = isDark ? 'light' : 'dark';
                        root.setAttribute('data-theme', next);
                        localStorage.setItem('theme', next);
                    });
                }
            })();
        </script>
        <script src="site.js"></script>
        <div class="pdf-container">
